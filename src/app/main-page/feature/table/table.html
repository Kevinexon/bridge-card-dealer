<div class="flex flex-wrap p-4 min-h-240 h-screen">
  <div class="flex w-full items-start">
    <div class="flex-1 p-4">
      <app-bidding />
    </div>

    <div class="w-1/4 p-4">
      <app-hand [handName]="'North'" [isDealer]="true" [isVulnerable]="true" />
    </div>

    <div class="flex-1 p-4"></div>
  </div>

  <div class="flex w-full items-center">
    <div class="w-1/4 p-4">
      <app-hand [handName]="'West'" />
    </div>

    <div class="flex-1 p-4"></div>

    <div class="w-1/4 p-4">
      <app-hand [handName]="'East'" />
    </div>
  </div>

  <div class="flex w-full items-end">
    <div class="flex-1 p-4"></div>

    <div class="w-1/4 p-4">
      <app-hand [handName]="'South'" [isVulnerable]="true" />
    </div>

    <div class="flex-1 p-4"></div>
  </div>
</div>
