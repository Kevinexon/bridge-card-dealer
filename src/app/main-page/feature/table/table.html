<div class="flex flex-wrap p-4 min-h-240 h-screen">
  <div class="flex w-full items-start h-1/3">
    <div class="flex-1 p-4">
      <app-bidding-table
        [biddingHistory]="biddingHistory()"
        [isNSVulnerable]="isNsVulnerable()"
        [isEWVulnerable]="isEwVulnerable()"
      />
    </div>

    <div class="w-1/3 p-4">
      <app-hand
        [handName]="'North'"
        [isDealer]="dealer() === 'North'"
        [isVulnerable]="isNsVulnerable()"
        [handDeck]="northHand()"
        [handsTurn]="whichHandsTurn() === 'North'"
        [canPlay]="!biddingFase()"
        [canMoveCards]="cardsMovementEnabled()"
        [restHands]="['South', 'East', 'West']"
        (onCardDropped)="onMoveCard($event)"
        (onCardPlayed)="onCardPlayed($event)"
      />
    </div>

    <div class="flex-1 p-4">
      <app-top-admin-panel
        [(dealer)]="dealer"
        [(linesVulnerable)]="linesVulnerable"
        [(number)]="number"
        [(editMode)]="cardsMovementEnabled"
        (onDealNew)="dealNewDeck()"
        (onReset)="reset()"
      />
    </div>
  </div>

  <div class="flex w-full items-center h-1/3">
    <div class="w-1/3 p-4">
      <app-hand
        [handName]="'West'"
        [isDealer]="dealer() === 'West'"
        [isVulnerable]="isEwVulnerable()"
        [handDeck]="westHand()"
        [handsTurn]="whichHandsTurn() === 'West'"
        [canPlay]="!biddingFase()"
        [canMoveCards]="cardsMovementEnabled()"
        [restHands]="['South', 'East', 'North']"
        (onCardDropped)="onMoveCard($event)"
        (onCardPlayed)="onCardPlayed($event)"
      />
    </div>

    <div class="flex-1 p-4">
      @if (biddingFase()) {
        <app-bidding-panel
          [handTurn]="whichHandsTurn()"
          [biddingHistory]="biddingHistory()"
          (onBidding)="onBidding($event)"
        />
      } @else {
        <app-play-area [playedCards]="playedCards()" />
      }
    </div>

    <div class="w-1/3 p-4">
      <app-hand
        [handName]="'East'"
        [isDealer]="dealer() === 'East'"
        [isVulnerable]="isEwVulnerable()"
        [handDeck]="eastHand()"
        [handsTurn]="whichHandsTurn() === 'East'"
        [canPlay]="!biddingFase()"
        [canMoveCards]="cardsMovementEnabled()"
        [restHands]="['South', 'North', 'West']"
        (onCardDropped)="onMoveCard($event)"
        (onCardPlayed)="onCardPlayed($event)"
      />
    </div>
  </div>

  <div class="flex w-full items-end h-1/3">
    <div class="flex-1 p-4">
      <app-tricks-count
        [number]="number()"
        [playedTricks]="playedTricks()"
        [contract]="contract() ?? undefined"
      />
    </div>

    <div class="w-1/3 p-4">
      <app-hand
        [handName]="'South'"
        [isDealer]="dealer() === 'South'"
        [isVulnerable]="isNsVulnerable()"
        [handDeck]="southHand()"
        [handsTurn]="whichHandsTurn() === 'South'"
        [canPlay]="!biddingFase()"
        [canMoveCards]="cardsMovementEnabled()"
        [restHands]="['North', 'East', 'West']"
        (onCardDropped)="onMoveCard($event)"
        (onCardPlayed)="onCardPlayed($event)"
      />
    </div>

    <div class="flex-1 p-4 flex justify-end">
      <app-bottom-admin-panel
        (undoBid)="onUndoBid()"
        (resetBidding)="resetBidding()"
        (undoCard)="onUndoCard()"
        (undoTrick)="onUndoTrick()"
        (resetPlayedCards)="resetPlayedCards()"
      />
    </div>
  </div>
</div>
