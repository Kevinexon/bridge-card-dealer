<div class="p-4 rounded-2xl max-w-132" [class]="isPanelHidden() ? '' : 'shadow-sm bg-gray-100'">
  <div class="text-2xl flex justify-between">
    <div><span class="text-xl" [class.hidden]="isPanelHidden()">Licytacja</span></div>
    <button matIconButton (click)="changePanelVisibility()">
      <mat-icon>menu</mat-icon>
    </button>
  </div>

  <section [class.hidden]="isPanelHidden()">
    <div class="mb-4 mt-2">
      <button matButton="outlined" class="mx-1" (click)="resetBidding.emit()">
        <mat-icon>undo</mat-icon>
        Cofnij licytacje
      </button>
      <button matButton="outlined" class="mx-1" (click)="undoBid.emit()">
        <mat-icon>keyboard_arrow_left</mat-icon>
        Cofnij odzywkę
      </button>
    </div>

    <mat-divider />

    <p class="text-xl my-4">Rozgrywka</p>
    <div>
      <button matButton="outlined" class="mx-1" (click)="resetPlayedCards.emit()">
        <mat-icon>undo</mat-icon>
        Cofnij rogrywkę
      </button>

      <button matButton="outlined" class="mx-1" (click)="undoTrick.emit()">
        <mat-icon>keyboard_double_arrow_left</mat-icon>
        Cofnij lewę
      </button>

      <button matButton="outlined" class="mx-1" (click)="undoCard.emit()">
        <mat-icon>keyboard_arrow_left</mat-icon>
        Cofnij kartę
      </button>
    </div>
  </section>
</div>
