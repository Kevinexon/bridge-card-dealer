<div class="w-full h-full">
  <div class="m-auto h-120 w-100 relative">
    @for (item of playedCards(); track $index) {
      @switch (item.hand) {
        @case ('North') {
          <img
            [src]="item.imgUrl"
            [alt]="item.color + ' ' + item.name"
            [class]="`z-${$index}`"
            class="absolute h-48 border border-gray-500 rounded-md w-32 top-0 left-34"
          />
        }
        @case ('South') {
          <img
            [src]="item.imgUrl"
            [alt]="item.color + ' ' + item.name"
            [class]="`z-${$index}`"
            class="absolute h-48 border border-gray-500 rounded-md w-32 bottom-0 right-34"
          />
        }
        @case ('East') {
          <img
            [src]="item.imgUrl"
            [alt]="item.color + ' ' + item.name"
            [class]="`z-${$index}`"
            class="absolute h-48 border border-gray-500 rounded-md w-32 top-36 right-0"
          />
        }
        @case ('West') {
          <img
            [src]="item.imgUrl"
            [alt]="item.color + ' ' + item.name"
            [class]="`z-${$index}`"
            class="absolute h-48 border border-gray-500 rounded-md w-32 top-36 left-0"
          />
        }
      }
    }
  </div>
</div>
